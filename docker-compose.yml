version: '3.8'

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - ML_API_URL=http://ml-service:8000
      - NODE_ENV=production
    depends_on:
      - ml-service
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:-}
    volumes:
      - ./ml-service/models:/app/models:ro
      - ./ml-service/data:/app/data:ro
    restart: unless-stopped
